apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: accounts
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: bank-platform
  source:
    repoURL: https://github.com/amad194/mal-assessment.git
    targetRevision: main
    path: deploy/helm/accounts
    helm:
      valueFiles:
        - values.yaml
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: accounts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true # revert manual drift — the repo is the source of truth
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff: { duration: 15s, factor: 2, maxDuration: 5m }
