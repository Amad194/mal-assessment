{{- if .Values.migrateJob.enabled }}
# Schema migrations run as a Helm pre-install/pre-upgrade hook, before the new
# app version rolls out. golang-migrate is idempotent and version-tracked.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "accounts.fullname" . }}-migrate
  labels: {{- include "accounts.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels: {{- include "accounts.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "accounts.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: migrate
          image: {{ .Values.migrateJob.image }}
          args:
            - "-path=/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "accounts.fullname" . }}-db
                  key: database-url
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: {{ include "accounts.fullname" . }}-migrations
{{- end }}
