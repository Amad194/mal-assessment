{{- if .Values.networkPolicy.enabled }}
# Default-deny + explicit allows. In a regulated bank, "which pod can talk to
# what" is an auditable control, not an afterthought.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "accounts.fullname" . }}
  labels: {{- include "accounts.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "accounts.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    # App traffic from the ingress controller.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: http
          protocol: TCP
    # Prometheus scraping /metrics.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: http
          protocol: TCP
  egress:
    # DNS.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Postgres (RDS) and Kafka (MSK) live outside the cluster CIDR; allow egress
    # to their ports. Tightened to the VPC CIDR via a CiliumNetworkPolicy/CIDR
    # selector in a real cluster — see DECISIONS.md.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - port: 5432
          protocol: TCP
        - port: 9092
          protocol: TCP
        - port: 9094 # MSK TLS
          protocol: TCP
{{- end }}
