{{- if and .Values.consumer.enabled .Values.kafka.brokers }}
{{- if .Values.externalSecrets.enabled }}
# Consumer gets its OWN credential (accounts_consumer role) from Secrets Manager,
# separate from the API's — so the two blast radii are independent.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "accounts.fullname" . }}-consumer-db
  labels:
    {{- include "accounts.labels" . | nindent 4 }}
    app.kubernetes.io/component: consumer
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef }}
    kind: ClusterSecretStore
  target:
    name: {{ include "accounts.fullname" . }}-consumer-db
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.consumer.externalSecrets.remoteKey }}
{{- else if .Values.localSecret.databaseUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "accounts.fullname" . }}-consumer-db
  labels:
    {{- include "accounts.labels" . | nindent 4 }}
    app.kubernetes.io/component: consumer
type: Opaque
stringData:
  database-url: {{ .Values.localSecret.databaseUrl | quote }}
{{- end }}
{{- end }}
