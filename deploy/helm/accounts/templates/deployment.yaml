apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "accounts.fullname" . }}
  labels: {{- include "accounts.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels: {{- include "accounts.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0        # never drop below desired during a rollout
      maxSurge: 1
  template:
    metadata:
      labels: {{- include "accounts.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when non-secret config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "accounts.serviceAccountName" . }}
      # Spread replicas across nodes/AZs so a single node or AZ loss can't take
      # the service below the PDB floor.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {{- include "accounts.selectorLabels" . | nindent 14 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: accounts-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.config.PORT | int }}
          envFrom:
            - configMapRef:
                name: {{ include "accounts.fullname" . }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "accounts.fullname" . }}-db
                  key: database-url
            {{- if .Values.kafka.brokers }}
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.kafka.topic | quote }}
            {{- end }}
            {{- if .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- end }}
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 2
          # --- Zero-downtime rollout mechanism ---------------------------------
          # 1. Pod enters Terminating -> kubelet removes it from Service endpoints.
          # 2. preStop runs FIRST (before SIGTERM): the binary hits /internal/drain
          #    so /readyz starts returning 503, then sleeps SHUTDOWN_DELAY so the
          #    LB/kube-proxy converge while in-flight requests still complete.
          # 3. Only then does the container get SIGTERM; the app drains connections
          #    within SHUTDOWN_TIMEOUT, all inside terminationGracePeriodSeconds.
          lifecycle:
            preStop:
              exec:
                command: ["/accounts-api", "-presleep"]
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 40
