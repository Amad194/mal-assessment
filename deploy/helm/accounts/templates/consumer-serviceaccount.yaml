{{- if and .Values.consumer.enabled .Values.kafka.brokers .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "accounts.fullname" . }}-consumer
  labels:
    {{- include "accounts.labels" . | nindent 4 }}
    app.kubernetes.io/component: consumer
  {{- if .Values.serviceAccount.consumerRoleArn }}
  annotations:
    # Separate IRSA role from the API => independent blast radius.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.consumerRoleArn | quote }}
  {{- end }}
{{- end }}
