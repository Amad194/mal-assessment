{{- if .Values.externalSecrets.enabled }}
# Production path: External Secrets Operator pulls DATABASE_URL from AWS Secrets
# Manager and projects it into a native Secret. The app never sees AWS creds —
# ESO uses the IRSA role. Rotation in Secrets Manager propagates on refresh.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "accounts.fullname" . }}-db
  labels: {{- include "accounts.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef }}
    kind: ClusterSecretStore
  target:
    name: {{ include "accounts.fullname" . }}-db
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: {{ .Values.externalSecrets.remoteKey }}
{{- else if .Values.localSecret.databaseUrl }}
# Local/kind fallback only — a plain Secret. Do not use in any shared cluster.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "accounts.fullname" . }}-db
  labels: {{- include "accounts.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.localSecret.databaseUrl | quote }}
{{- end }}
