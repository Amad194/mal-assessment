# Default values. values-prod.yaml overlays the production-hardened settings.
image:
  repository: ghcr.io/amad194/accounts-api
  tag: "0ed73bb"
  pullPolicy: IfNotPresent

replicaCount: 3

# Kafka -> AWS MSK. Empty brokers => app uses the noop publisher.
kafka:
  brokers: "" # e.g. "b-1.msk...:9092,b-2.msk...:9092"
  topic: accounts.audit

# Non-secret config -> ConfigMap.
config:
  PORT: "8080"
  SHUTDOWN_DELAY: "5s"
  SHUTDOWN_TIMEOUT: "25s"

# OpenTelemetry: point at an OTLP/gRPC collector to enable tracing. Empty => off.
otel:
  endpoint: "" # e.g. http://otel-collector.monitoring.svc:4317

# The idempotent Kafka consumer (accounts.audit -> Postgres audit_log).
consumer:
  enabled: true
  image:
    repository: ghcr.io/amad194/accounts-consumer
    tag: "0.1.0"
  replicaCount: 2
  groupId: accounts-audit-consumer
  dlqTopic: accounts.audit.dlq
  maxRetries: "5"
  # Consumer reads DATABASE_URL from its own least-privilege secret (accounts_consumer role).
  externalSecrets:
    remoteKey: prod/accounts/consumer-database-url
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { memory: 128Mi }

# Secret (DATABASE_URL) -> hydrated from AWS Secrets Manager by External
# Secrets Operator. Disable to fall back to a plain Secret for local kind runs.
externalSecrets:
  enabled: true
  secretStoreRef: aws-secrets-manager # ClusterSecretStore name
  remoteKey: prod/accounts/database-url # key in AWS Secrets Manager

# Local/kind fallback: a plain Secret created from this value. NEVER used in
# prod (prod path is externalSecrets above). Left empty on purpose.
localSecret:
  databaseUrl: ""

serviceAccount:
  create: true
  # IRSA: the IAM role the API pod assumes (Secrets Manager read, MSK produce).
  # Filled from the Terraform output. Empty => no annotation (local runs).
  roleArn: ""
  # Separate IRSA role for the consumer (Secrets read, MSK consume + DLQ produce).
  consumerRoleArn: ""

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    # No CPU limit on purpose (avoids throttling latency-sensitive paths);
    # memory limit set to catch leaks. See DECISIONS.md.
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 15s

prometheusRule:
  enabled: true

migrateJob:
  enabled: true
  image: migrate/migrate:v4.17.1
