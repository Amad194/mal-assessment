# Local dev stack: Postgres + single-broker Kafka + the API + the consumer.
# Local equivalents of RDS (Postgres) and MSK (Kafka). Lets you exercise the real
# code paths (readiness, DB read, audit publish, idempotent consume, DLQ) without
# a cloud account. See README for the AWS mapping.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: accounts
      POSTGRES_PASSWORD: accounts
      POSTGRES_DB: accounts
    ports: ["5432:5432"]
    volumes:
      - ./db/migrations/0001_init.up.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./db/migrations/0002_audit.up.sql:/docker-entrypoint-initdb.d/02_audit.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounts"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: ["9092:9092"]

  accounts-api:
    build: ./app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://accounts:accounts@postgres:5432/accounts?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: accounts.audit
    ports: ["8080:8080"]

  accounts-consumer:
    build: ./consumer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      # Locally reuses the accounts user; in prod this is the least-privilege
      # accounts_consumer role (see db/roles.sql).
      DATABASE_URL: postgres://accounts:accounts@postgres:5432/accounts?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: accounts.audit
      KAFKA_DLQ_TOPIC: accounts.audit.dlq
      KAFKA_GROUP_ID: accounts-audit-consumer
      MAX_RETRIES: "5"
    ports: ["8081:8080"]
