name: bootstrap
# One-shot helper (needs the Go/Docker toolchains I don't have locally):
#  - tidy both modules -> go.sum
#  - resolve + pin base image digests in both Dockerfiles
# Then commits the result. Removed after it has run.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }

      - name: Tidy app module
        working-directory: app
        run: go mod tidy

      - name: Tidy consumer module
        working-directory: consumer
        run: go mod tidy

      - uses: docker/setup-buildx-action@v3

      - name: Pin base image digests
        run: |
          set -e
          GO=$(docker buildx imagetools inspect golang:1.26-alpine --format '{{.Manifest.Digest}}')
          DL=$(docker buildx imagetools inspect gcr.io/distroless/static-debian12:nonroot --format '{{.Manifest.Digest}}')
          echo "golang=$GO distroless=$DL"
          for f in app/Dockerfile consumer/Dockerfile; do
            sed -i "s|^FROM golang:1.26-alpine AS build|FROM golang:1.26-alpine@${GO} AS build|" "$f"
            sed -i "s|^FROM gcr.io/distroless/static-debian12:nonroot$|FROM gcr.io/distroless/static-debian12:nonroot@${DL}|" "$f"
          done

      - name: Commit
        run: |
          git config user.name  "Amad194"
          git config user.email "amadshahzad830@gmail.com"
          git add app/go.mod app/go.sum consumer/go.mod consumer/go.sum app/Dockerfile consumer/Dockerfile
          git commit -m "chore: tidy modules and pin base image digests [skip ci]" || echo "nothing to commit"
          git push
