name: bootstrap
# One-shot helper: upgrade vulnerable deps to their patched releases and
# regenerate go.sum (needs the Go toolchain). Removed after it has run.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }
      - name: Upgrade vulnerable modules to latest patched
        working-directory: app
        run: |
          go get github.com/jackc/pgx/v5@latest
          go get golang.org/x/crypto@latest
          go get github.com/segmentio/kafka-go@latest
          go get github.com/prometheus/client_golang@latest
          go mod tidy
      - name: Commit
        run: |
          git config user.name  "Amad194"
          git config user.email "amadshahzad830@gmail.com"
          git add app/go.mod app/go.sum
          git commit -m "security: upgrade deps to patched releases (pgx, x/crypto) [skip ci]" || echo "nothing to commit"
          git push
