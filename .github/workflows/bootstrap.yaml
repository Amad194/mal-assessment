name: bootstrap
# One-shot helper: generate go.sum (needs the Go toolchain) and canonicalise
# Terraform formatting, then commit them back. Removed after it has run once.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.23" }
      - name: go mod tidy (writes go.mod + go.sum)
        working-directory: app
        run: go mod tidy
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.9.5" }
      - name: terraform fmt
        working-directory: terraform
        run: terraform fmt -recursive
      - name: Commit
        run: |
          git config user.name  "Amad194"
          git config user.email "amadshahzad830@gmail.com"
          git add app/go.mod app/go.sum terraform/
          git commit -m "chore: generate go.sum and canonicalise terraform fmt [skip ci]" || echo "nothing to commit"
          git push
