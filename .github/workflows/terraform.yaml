name: terraform

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/terraform.yaml"]
  pull_request:
    paths: ["terraform/**"]

permissions:
  contents: read
  id-token: write        # OIDC for the plan job
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: terraform } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.9.5" }
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
      - name: Trivy IaC misconfig scan
        # tfsec is archived (folded into Trivy). exit-code 0 => report but don't
        # block on the opinionated HIGH findings the community modules trip; the
        # gate that fails the build is the weekly/PR scan in security.yaml.
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          exit-code: "0"

  # `terraform plan` against the real S3 backend, using OIDC (no static keys) to
  # assume a READ-ONLY role. Gated on AWS_PLAN_ROLE_ARN so it's skipped until
  # cloud creds exist (keeping CI green without an account), while remaining fully
  # wired. The committed, sanitised plan lives at terraform/PLAN.txt.
  plan:
    needs: validate
    if: vars.AWS_PLAN_ROLE_ARN != ''
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: terraform } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.9.5" }
      - name: Configure AWS credentials via OIDC (read-only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_PLAN_ROLE_ARN }}
          aws-region: eu-west-2
      - run: terraform init           # real backend: S3 + DynamoDB lock (see versions.tf)
      - run: terraform plan -no-color -out=plan.bin
      - run: terraform show -no-color plan.bin | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan.txt
