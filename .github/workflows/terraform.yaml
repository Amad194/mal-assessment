name: terraform

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["terraform/**", ".github/workflows/terraform.yaml"]
  pull_request:
    paths: ["terraform/**"]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: terraform } }
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.9.5" }
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
      - name: Trivy IaC misconfig scan
        # tfsec is archived (folded into Trivy). exit-code 0 => report but don't
        # block on the opinionated HIGH findings the community modules trip; the
        # gate that fails the build is the weekly/PR scan in security.yaml.
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: config
          scan-ref: terraform
          severity: HIGH,CRITICAL
          exit-code: "0"
      # Plan is illustrative only — no AWS creds wired here; a real pipeline
      # would assume a read-only role via OIDC and post the plan to the PR.
      # - run: terraform plan -no-color
