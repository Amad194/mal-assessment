name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
    # NB: deliberately NOT triggered by deploy/helm/** — otherwise the
    # gitops-bump commit below (which edits values.yaml) would re-trigger this
    # workflow in an infinite build loop. Chart-only changes are covered by
    # helm.yaml. The [skip ci] on the bump commit is a second guard.
    paths: ["app/**", ".github/workflows/ci.yaml"]
  pull_request:
    paths: ["app/**", ".github/workflows/ci.yaml"]

# Serialize CI per branch so two runs can't race on the gitops-bump push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # bump image tag for GitOps
  packages: write   # push to ghcr.io
  id-token: write   # cosign keyless (OIDC)

env:
  IMAGE: ghcr.io/amad194/accounts-api

jobs:
  test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: app } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26", cache-dependency-path: app/go.mod }
      - run: go mod download
      - run: go vet ./...
      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - run: go test -race -coverprofile=cover.out ./...
      - run: go tool cover -func=cover.out | tail -1

  build-scan-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute tag
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      # Build and LOAD into the local daemon first so Trivy can scan the exact
      # image before we publish it (scan-then-push, no unauthenticated pull).
      - name: Build (load locally)
        uses: docker/build-push-action@v6
        with:
          context: ./app
          load: true
          push: false
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
      - name: Trivy image scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          format: cyclonedx-json
          artifact-name: accounts-api-sbom.cdx.json
      - name: Push (only after the scan passes)
        run: docker push ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Cosign sign (keyless)
        run: cosign sign --yes ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}

  gitops-bump:
    needs: build-scan-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump image tag in Helm values (Argo CD syncs this)
        run: |
          sed -i -E "s/^(  tag: ).*/\1\"${{ needs.build-scan-push.outputs.tag }}\"/" deploy/helm/accounts/values.yaml
      - name: Commit
        run: |
          git config user.name  "Amad194"
          git config user.email "amadshahzad830@gmail.com"
          git add deploy/helm/accounts/values.yaml
          git commit -m "ci: bump accounts-api image to ${{ needs.build-scan-push.outputs.tag }} [skip ci]" || { echo "no change"; exit 0; }
          # Rebase-and-retry so a concurrent push can't reject the bump.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            sleep $((i * 3))
          done
          echo "failed to push bump after retries" >&2; exit 1

  # Production-equivalent deploy. In GitOps, Argo CD reconciles the bumped tag;
  # this job exists to show the OIDC + manual-approval + rollback path a push-based
  # deploy would use. It is gated on the `production` GitHub Environment (which
  # carries the required-reviewer approval rule) and skipped until an AWS deploy
  # role is configured, so it never fails on a repo without cloud creds.
  deploy-production:
    needs: gitops-bump
    if: github.ref == 'refs/heads/main' && vars.AWS_DEPLOY_ROLE_ARN != ''
    runs-on: ubuntu-latest
    environment: production   # <-- manual approval gate (required reviewers)
    permissions:
      id-token: write         # OIDC — no long-lived static keys
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2
      - name: Deploy (Argo CD sync of the bumped tag)
        run: |
          aws eks update-kubeconfig --name bank-platform --region eu-west-2
          # GitOps: Argo CD auto-syncs the committed tag. For a push-based model:
          #   helm upgrade --install accounts deploy/helm/accounts \
          #     -f deploy/helm/accounts/values.yaml -f deploy/helm/accounts/values-prod.yaml
          # Rollback: `git revert` the bump commit (Argo re-syncs the prior tag),
          # or `argocd app rollback accounts`, or `helm rollback accounts`.
          echo "Deploy handled by Argo CD reconcile; see docs/ROLLBACK.md"
